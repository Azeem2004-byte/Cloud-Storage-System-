<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Segoe UI;
    height:100vh;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    background: linear-gradient(135deg,#0ea5e9,#2563eb);
}

/* 🌸 ANIMATED BACKGROUND SHAPES */
.background span{
    position:absolute;
    display:block;
    width:20px;
    height:20px;
    background:rgba(255,255,255,0.25);
    animation:move 10s linear infinite;
    bottom:-150px;
    border-radius:50%;
}

/* multiple shapes */
.background span:nth-child(1){left:10%; width:40px; height:40px; animation-duration:12s;}
.background span:nth-child(2){left:20%; animation-duration:8s;}
.background span:nth-child(3){left:35%; width:60px; height:60px; animation-duration:15s;}
.background span:nth-child(4){left:50%; animation-duration:10s;}
.background span:nth-child(5){left:70%; width:30px; height:30px; animation-duration:7s;}
.background span:nth-child(6){left:85%; animation-duration:11s;}

@keyframes move{
    0%{
        transform:translateY(0) scale(1);
        opacity:1;
    }
    100%{
        transform:translateY(-1000px) scale(0.5);
        opacity:0;
    }
}

/* CARD */
.card{
    position:relative;
    z-index:2;

    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    padding:30px;
    border-radius:16px;
    width:350px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    animation:fadeIn 0.8s ease;
}

/* LOGO */
.logo{
    text-align:center;
    margin-bottom:10px;
}

.logo h1{
    color:white;
    font-size:22px;
    margin:0;
}

.logo p{
    color:#e0f2fe;
    font-size:12px;
    margin:5px 0 15px 0;
}

/* INPUTS */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    outline:none;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#111827;
    color:white;
    cursor:pointer;
    transition:0.3s;
    font-weight:bold;
}

button:hover{
    background:black;
    transform:scale(1.05);
}

/* LINK */
a{
    color:white;
    text-decoration:none;
}

/* ANIMATION */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

/* RESPONSIVE */
@media(max-width:600px){
    .card{
        width:90%;
    }
}
</style>

</head>

<body>

<!-- 🌸 BACKGROUND ANIMATION -->
<div class="background">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>

<!-- REGISTER CARD -->
<div class="card">

    <!-- LOGO -->
    <div class="logo">
        <h1>☁ Cloud Storage</h1>
        <p>Secure • Fast • Modern File System</p>
    </div>

    <form action="/register" method="POST">
        <input type="text" name="name" placeholder="Full Name">
        <input type="email" name="email" placeholder="Email">
        <input type="password" name="password" placeholder="Password">
        <button>Register</button>
    </form>

    <p style="color:white;text-align:center;">
        Already have account? <a href="/login">Login</a>
    </p>

</div>

</body>
</html>
